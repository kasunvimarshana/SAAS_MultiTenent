version: '3.8'

services:
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - user-service
      - product-service
      - inventory-service
      - order-service
    networks:
      - saas-network

  user-service:
    build: ./user-service
    ports:
      - "8001:8001"
    environment:
      - APP_ENV=local
      - DB_HOST=user-db
      - DB_DATABASE=user_service
      - DB_USERNAME=user
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - user-db
      - redis
      - rabbitmq
    networks:
      - saas-network

  product-service:
    build: ./product-service
    ports:
      - "8002:8002"
    environment:
      - APP_ENV=local
      - DB_HOST=product-db
      - DB_DATABASE=product_service
      - DB_USERNAME=user
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - product-db
      - redis
      - rabbitmq
    networks:
      - saas-network

  inventory-service:
    build: ./inventory-service
    ports:
      - "8003:8003"
    environment:
      - APP_ENV=local
      - DB_HOST=inventory-db
      - DB_DATABASE=inventory_service
      - DB_USERNAME=user
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
      - PRODUCT_SERVICE_URL=http://product-service:8002
    depends_on:
      - inventory-db
      - redis
      - rabbitmq
    networks:
      - saas-network

  order-service:
    build: ./order-service
    ports:
      - "8004:8004"
    environment:
      - APP_ENV=local
      - DB_HOST=order-db
      - DB_DATABASE=order_service
      - DB_USERNAME=user
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
      - INVENTORY_SERVICE_URL=http://inventory-service:8003
      - PRODUCT_SERVICE_URL=http://product-service:8002
    depends_on:
      - order-db
      - redis
      - rabbitmq
    networks:
      - saas-network

  user-db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: user_service
      MYSQL_USER: user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - user-db-data:/var/lib/mysql
    networks:
      - saas-network

  product-db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: product_service
      MYSQL_USER: user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - product-db-data:/var/lib/mysql
    networks:
      - saas-network

  inventory-db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: inventory_service
      MYSQL_USER: user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - inventory-db-data:/var/lib/mysql
    networks:
      - saas-network

  order-db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: order_service
      MYSQL_USER: user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - order-db-data:/var/lib/mysql
    networks:
      - saas-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - saas-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - saas-network

networks:
  saas-network:
    driver: bridge

volumes:
  user-db-data:
  product-db-data:
  inventory-db-data:
  order-db-data:
